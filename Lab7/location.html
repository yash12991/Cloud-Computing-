<!DOCTYPE html>
<html>

<body>

<h2>Send Classroom GPS</h2>

<button onclick="sendLocation()">Send GPS Location</button>

<p id="status"></p>

<script>

function sendLocation(){

    navigator.geolocation.getCurrentPosition(function(position){

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        fetch(`http://192.168.49.2:30007/update-location?lat=${lat}&lon=${lon}`)
        .then(res=>res.json())
        .then(data=>{

            document.getElementById("status").innerHTML =
            "Location sent: "+lat+" , "+lon;

        });

    });

}

</script>

</body>
</html>
